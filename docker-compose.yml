services:
  ui-client:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      VITE_IDP_BASE_URL: ${VITE_IDP_BASE_URL:-http://localhost:3000}
      VITE_BE_BASE_URL: ${VITE_BE_BASE_URL:-http://localhost:3001}
      VITE_LOG_LEVEL: ${VITE_LOG_LEVEL:-info}
    ports:
      - "5173:5173"
    restart: unless-stopped
